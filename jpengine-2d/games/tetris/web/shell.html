<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Tetris — JPEngine</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: url('images/tetris-jpengine.png') no-repeat center center fixed;
      background-size: cover;
      background-color: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      display: block;
      image-rendering: pixelated;
      border: 2px solid #000;
      width: 650px;
      height: 500px;
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>
  <script>
    const SDL_WIDTH = 800;
    const SDL_HEIGHT = 600;

    const canvas = document.getElementById('canvas');
    canvas.width = SDL_WIDTH;
    canvas.height = SDL_HEIGHT;

    // SDL sets the document title from its window title; override it after load
    window.addEventListener('load', () => {
      setTimeout(() => {document.title = 'TETRIS';}, 100);
    });

    var Module = {
      canvas: canvas
    };
  </script>
  {{{ SCRIPT }}}
</body>

</html>
