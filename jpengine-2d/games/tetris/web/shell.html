<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tetris — JPEngine</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: url('images/tetris-jpengine.png') center / cover no-repeat fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    #canvas-wrapper {
      position: relative;
    }

    canvas#canvas {
      display: block;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    #status {
      color: #fff;
      margin-top: 8px;
      font-size: 14px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
    }

    #progress {
      width: 100%;
      height: 4px;
      margin-top: 4px;
      accent-color: #fff;
    }
  </style>
</head>

<body>
  <div id="canvas-wrapper">
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  </div>
  <div id="status">Loading...</div>
  <progress id="progress" value="0" max="100"></progress>

  <script>
    var Module = {
      canvas: document.getElementById('canvas'),
      setStatus: function (text) {
        var status = document.getElementById('status');
        var progress = document.getElementById('progress');
        if (text) {
          var match = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          if (match) {
            progress.value = parseInt(match[2]);
            progress.max = parseInt(match[4]);
            status.textContent = match[1];
          } else {
            status.textContent = text;
          }
        } else {
          status.textContent = '';
          progress.style.display = 'none';
        }
      },
      monitorRunDependencies: function (left) {
        if (left === 0) Module.setStatus('');
      }
    };
    window.onerror = function (msg) {
      Module.setStatus('Error: ' + msg);
    };
  </script>
  {{{ SCRIPT }}}
</body>

</html>
