name: Linux Build (jpengine-2d)

on:
  push:
    branches: [main]
    paths:
      - 'jpengine-2d/**'
      - '.github/workflows/build-linux-2d.yml'
  pull_request:
    branches: [main]
    paths:
      - 'jpengine-2d/**'
      - '.github/workflows/build-linux-2d.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make g++ libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libgles2

      - name: Configure
        working-directory: jpengine-2d
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: jpengine-2d
        run: cmake --build build --config Release
