name: WASM Build (jpengine-2d)

on:
  push:
    branches: [main]
    paths:
      - 'jpengine-2d/**'
      - '.github/workflows/build-wasm-2d.yml'
  pull_request:
    branches: [main]
    paths:
      - 'jpengine-2d/**'
      - '.github/workflows/build-wasm-2d.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: latest

      - name: Configure
        working-directory: jpengine-2d
        run: emcmake cmake -B build-wasm -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: jpengine-2d
        run: cmake --build build-wasm
