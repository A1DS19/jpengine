name: Linux Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - project: jpengine-2d
            apt_packages: libsdl2-dev libsdl2-image-dev libgles2
          - project: jpengine-3d
            apt_packages: libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev

    name: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make g++ ${{ matrix.apt_packages }}

      - name: Configure
        working-directory: ${{ matrix.project }}
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: ${{ matrix.project }}
        run: cmake --build build --config Release
