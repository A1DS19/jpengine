name: Linux Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make g++ libsdl2-dev libsdl2-image-dev libgles2

      - name: Configure
        working-directory: jpengine
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: jpengine
        run: cmake --build build --config Release
